    '/category/world/':'World','/category/world':'World','/category/politics/':'Politics','/category/politics':'Politics','/category/business/':'Business','/category/business':'Business','/category/markets/':'Markets','/category/markets':'Markets','/category/technology/':'Technology','/category/technology':'Technology','/category/entertainment/':'Entertainment','/category/entertainment':'Entertainment','/category/environment/':'Environment','/category/environment':'Environment','/category/energy/':'Energy','/category/energy':'Energy','/category/opinion/':'Opinion','/category/opinion':'Opinion','/category/local/':'Local','/category/local':'Local','/category/investigations/':'Investigations','/category/investigations':'Investigations','/category/special-reports/':'Special Reports','/category/special-reports':'Special Reports','/category/religion-and-spirituality/':'Religion & Spirituality','/category/religion-and-spirituality':'Religion & Spirituality'
  };

})();

<script>

const CGN_FALLBACK_API_URL = "https://script.google.com/macros/s/AKfycbx41mQg-Ine3XZ-VrMI_SaQn4_K6cDQHA0cBFyGPgupu_edNFoNRjSLv2hoSe_bOytt/exec";

function getCgnApiBase(){
  return (
    window.CGN_API_BASE ||
    window.CGN_API_URL ||
    window.CGN_BACKEND_URL ||
    window.CGN_SITE_CONFIG?.google_apps_script_web_app_url ||
    window.CGN_SITE_CONFIG?.api?.google_apps_script_web_app_url ||
    window.CGN_SITE_CONFIG?.api?.baseUrl ||
    window.CGN_CONFIG?.google_apps_script_web_app_url ||
    window.CGN_CONFIG?.apiBase ||
    localStorage.getItem("cgn_api_base") ||
    CGN_FALLBACK_API_URL
  );
}

const API = getCgnApiBase();
const CGN_PAYWALLED_CONTENT_SELECTOR = ".cgn-paywalled-content";

/* SLUG */
function getArticlePathParts(pathValue){
  return String(pathValue || "")
    .split("?")[0]
    .split("#")[0]
    .split("/")
    .filter(Boolean)
    .filter(part => String(part).toLowerCase() !== "index.html");
}

function deriveSlugFromPath(pathValue){
  if(window.CGN_NOW_DISABLE_PATH_SLUG_DERIVE && !window.CGN_NOW_IS_ARTICLE_ROUTE){ return ""; }
  const parts = getArticlePathParts(pathValue);

  if(!parts.length){
    return "";
  }

  const last = parts[parts.length - 1];

  if(["news", "weather", "sports", "article.html"].includes(String(last || "").toLowerCase())){
    return "";
  }

  return last || "";
}

function cleanArticleSlug(value){
  const raw = String(value || "").trim();

  if(!raw || raw.toLowerCase() === "index.html"){
    return "";
  }

  return raw;
}

const slug =
  cleanArticleSlug(new URLSearchParams(window.location.search).get("slug")) ||
  cleanArticleSlug(window.CGN_STATIC_ARTICLE?.slug) ||
  cleanArticleSlug(window.slugFrom404) ||
  cleanArticleSlug(deriveSlugFromPath(window.location.pathname));

const CGN_ARTICLE_404_FALLBACK = window.CGN_ARTICLE_404_FALLBACK || null;

function cgnValidDatedArticleRoute(pathValue){
  const match = String(pathValue || "").match(
    /^\/(news|weather|sports)\/(\d{4})\/(\d{2})\/(\d{2})\/([^/]+)\/?$/
  );

  if(!match){
    return null;
  }

  const year = Number(match[2]);
  const month = Number(match[3]);
  const day = Number(match[4]);
  const dateUtc = Date.UTC(year, month - 1, day);
  const date = new Date(dateUtc);

  if(
    date.getUTCFullYear() !== year ||
    date.getUTCMonth() !== month - 1 ||
    date.getUTCDate() !== day
  ){
    return null;
  }

  return {
    family:match[1],
    year:year,
    month:month,
    day:day,
    slug:match[5],
    dateUtc:dateUtc
  };
}

function cgnBackendExplicitlySaysArticleNotFound(article){
  if(!article || article.success !== false){
    return false;
  }

  return /(?:^|\b)(?:article\s+)?not\s+found(?:\b|\.)/i.test(
    String(article.error || article.message || "").trim()
  );
}

function cgnMaybeRedirectMissingArticleToArchives(article){
  if(!CGN_ARTICLE_404_FALLBACK || !CGN_ARTICLE_404_FALLBACK.active){
    return false;
  }

  if(!cgnBackendExplicitlySaysArticleNotFound(article)){
    return false;
  }

  const route = cgnValidDatedArticleRoute(
    CGN_ARTICLE_404_FALLBACK.requestedPath || window.location.pathname
  );

  if(!route){
    return false;
  }

  const now = new Date();
  const todayUtc = Date.UTC(
    now.getUTCFullYear(),
    now.getUTCMonth(),
    now.getUTCDate()
  );
  const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;

  // The backend mover keeps articles in Articles through 168 hours and
  // moves only articles older than seven days. Match that rule here.
  if(todayUtc - route.dateUtc <= sevenDaysMs){
    return false;
  }

  const archiveUrl = new URL(
    CGN_ARTICLE_404_FALLBACK.archiveUrl || window.location.href
  );
  archiveUrl.protocol = "https:";
  archiveUrl.hostname = "archives.cgnnews.net";
  archiveUrl.port = "";

  window.location.replace(archiveUrl.toString());
  return true;
}

/* USER + ANON READER */
function getUser(){
  return localStorage.getItem("user_id") || "";
}

function getAnonId(){
  let anon = localStorage.getItem("anon_id");

  if(!anon){
    anon = "anon_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem("anon_id", anon);
  }

  return anon;
}

/* FRONTEND METERED PAYWALL FALLBACK — backend remains authority */
const CGN_ANON_FREE_LIMIT = 3;
const CGN_FREE_ACCOUNT_LIMIT = 6;

function cgnMeterSafeKey(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, "_")
    .slice(0, 80) || "user";
}

function cgnMeterStorageKey(){
  const userId = getUser();
  return userId
    ? "cgn_article_meter_user_v1_" + cgnMeterSafeKey(userId)
    : "cgn_article_meter_anon_v1";
}

function cgnReadMeter(key){
  try {
    const raw = localStorage.getItem(key);
    const parsed = raw ? JSON.parse(raw) : null;
    const slugs = Array.isArray(parsed?.slugs) ? parsed.slugs.map(String).filter(Boolean) : [];
    return { slugs:[...new Set(slugs)], updated_at: parsed?.updated_at || "" };
  } catch(e){
    return { slugs:[], updated_at:"" };
  }
}

function cgnWriteMeter(key, meter){
  try {
    localStorage.setItem(key, JSON.stringify({
      slugs:[...new Set((meter?.slugs || []).map(String).filter(Boolean))],
      updated_at:new Date().toISOString()
    }));
  } catch(e) {}
}

function cgnArticleMeterSlug(article){
  return cleanArticleSlug(article?.slug) ||
    cleanArticleSlug(deriveSlugFromPath(article?.url || article?.canonical_url || "")) ||
    cleanArticleSlug(slug);
}

function cgnStatusIsActiveSubscriber(value){
  return value === true || String(value || "").trim().toLowerCase() === "true" ||
    String(value || "").trim().toLowerCase() === "active" ||
    String(value || "").trim().toLowerCase() === "paid" ||
    String(value || "").trim().toLowerCase() === "subscriber";
}

function cgnArticleIndicatesSubscriber(article){
  if(!getUser()) return false;
  return localStorage.getItem("subscriber") === "true" ||
    cgnStatusIsActiveSubscriber(article?.subscriber) ||
    cgnStatusIsActiveSubscriber(article?.is_subscriber) ||
    cgnStatusIsActiveSubscriber(article?.subscription_active) ||
    cgnStatusIsActiveSubscriber(article?.subscription_status) ||
    cgnStatusIsActiveSubscriber(article?.access_level) ||
    cgnStatusIsActiveSubscriber(article?.reader_access);
}

function cgnArticleAccessDecision(article){
  const backendLocked = backendArticleIsLocked(article);
  const userId = getUser();
  const articleSlug = cgnArticleMeterSlug(article);
  const subscriber = cgnArticleIndicatesSubscriber(article);
  const limit = userId ? CGN_FREE_ACCOUNT_LIMIT : CGN_ANON_FREE_LIMIT;

  if(backendLocked){
    return {
      locked:true,
      paywall_limit: article?.paywall_limit || limit,
      reason:"backend"
    };
  }

  if(subscriber){
    return {
      locked:false,
      paywall_limit:0,
      reason:"subscriber"
    };
  }

  if(!articleSlug){
    return {
      locked:false,
      paywall_limit:limit,
      reason:"no_slug"
    };
  }

  const key = cgnMeterStorageKey();
  const meter = cgnReadMeter(key);
  const alreadyAllowed = meter.slugs.includes(articleSlug);

  if(alreadyAllowed){
    return {
      locked:false,
      paywall_limit:limit,
      reason:"already_counted"
    };
  }

  if(meter.slugs.length >= limit){
    return {
      locked:true,
      paywall_limit:limit,
      reason:userId ? "free_account_meter" : "anonymous_meter"
    };
  }

  meter.slugs.push(articleSlug);
  cgnWriteMeter(key, meter);

  return {
    locked:false,
    paywall_limit:limit,
    reason:"meter_counted"
  };
}

async function refreshCgnSubscriptionStatus(userId){
  if(!userId) return false;

  try {
    const res = await fetch(
      `${API}?action=subscription_status&user_id=${encodeURIComponent(userId)}`
    );
    const status = await res.json();
    const active =
      cgnStatusIsActiveSubscriber(status?.subscriber) ||
      cgnStatusIsActiveSubscriber(status?.is_subscriber) ||
      cgnStatusIsActiveSubscriber(status?.subscription_active) ||
      cgnStatusIsActiveSubscriber(status?.subscription_status) ||
      status?.can_subscribe === false;

    localStorage.setItem("subscriber", active ? "true" : "false");
    return active;
  } catch(e){
    return localStorage.getItem("subscriber") === "true";
  }
}

/* ACCOUNT UI */
function updateAccountUI(){
  const btn = document.getElementById("account-btn");
  if (!btn) return;

  if(getUser()){
    btn.innerText = "Account";
    btn.setAttribute("aria-label", "CGN News account");
  } else {
    btn.innerText = "Login";
    btn.setAttribute("aria-label", "Login or create CGN News account");
  }
}

function requestArticleLogin(){
  if(typeof window.CGN_OPEN_LOGIN === "function"){
    window.CGN_OPEN_LOGIN();
    return;
  }

  if(typeof window.openLogin === "function"){
    window.openLogin();
    return;
  }

  window.location.href = "/account/?login=1";
}

/* PAYWALL DISPLAY */
function backendArticleIsLocked(article){
  if(!article) return false;
  return article.locked === true || String(article.locked || "").trim().toLowerCase() === "true";
}

function showPaywall(article){

  const limitText = article && article.paywall_limit
    ? `You have reached your ${article.paywall_limit}-article free reading limit.`
    : "Subscribe to continue reading.";

  const isLoggedIn = !!getUser();

  const loginLine = isLoggedIn
    ? "Your free CGN News account is active. Subscribe for unlimited access."
    : "Create a free account to get 6 free articles. Subscribers get unlimited access.";

  const actionButton = isLoggedIn
    ? `<button type="button" onclick="startSubscription()">Subscribe / Pay With PayPal</button>`
    : `<button class="secondary" type="button" onclick="requestArticleLogin()">Login / Create Account</button>`;

  document.getElementById("paywall").innerHTML = `
    <div class="paywall">
      <h2>Subscribe to Continue Reading</h2>
      <p>${limitText}</p>
      <p>${loginLine}</p>
      ${actionButton}
      <div id="article-paypal-wrap" style="display:none;margin-top:18px;">
        <div style="margin-bottom:10px;font-size:13px;color:#555;line-height:1.45;">
          Complete your subscription securely with PayPal. Choose your preferred payment currency below, then use the same CGN News account when you return.
        </div>
        <div id="article-paypal-currency-wrap" style="margin-bottom:10px;"></div>
        <div id="article-paypal-container"></div>
      </div>
    </div>
  `;
}

function clearPaywall(){
  const el = document.getElementById("paywall");
  if(el) el.innerHTML = "";
}

function showArticlePayPalCheckout(){
  const user_id = getUser();

  if(!user_id){
    requestArticleLogin();
    return;
  }

  const wrap = document.getElementById("article-paypal-wrap");
  if(wrap){
    wrap.style.display = "block";
    wrap.scrollIntoView({ behavior:"smooth", block:"center" });
  }

  const currencyWrap = document.getElementById("article-paypal-currency-wrap");
  const container = document.getElementById("article-paypal-container");

  if(!window.CGNPayments || !container){
    if(container){
      container.innerHTML = '<p style="font-size:13px;color:#555;">PayPal checkout is still loading. Please try again in a moment.</p>';
    }
    return;
  }

  if(currencyWrap && !document.getElementById("article-paypal-currency")){
    currencyWrap.innerHTML = window.CGNPayments.currencySelectHtml("article-paypal-currency", "article");
    const createdSelect = document.getElementById("article-paypal-currency");
    if(createdSelect){
      createdSelect.addEventListener("change", function(){ showArticlePayPalCheckout(); });
    }
  }

  const select = document.getElementById("article-paypal-currency");
  const currency = select ? select.value : window.CGNPayments.getSelectedCurrency("USD");
  container.innerHTML = '<p style="font-size:13px;color:#555;">Loading secure PayPal checkout...</p>';

  window.CGNPayments.renderHostedButton({
    containerId:"article-paypal-container",
    currency:currency,
    context:"article"
  }).catch(function(err){
    console.error("CGN ARTICLE PAYPAL ERROR:", err);
    container.innerHTML = '<p style="font-size:13px;color:#7a1111;">PayPal checkout could not load. Refresh this page or try another currency.</p>';
  });
}

function clearArticleAccessStatus(){

}

function showArticleAccessStatus(message){
  const body = document.getElementById("body");
  if(!body) return;

  let el = document.getElementById("article-access-status");

  if(!el){
    el = document.createElement("div");
    el.id = "article-access-status";
    el.style.margin = "24px 0";
    el.style.padding = "16px";
    el.style.border = "1px solid #ddd";
    el.style.background = "#f7f7f7";
    el.style.textAlign = "center";
    el.style.color = "#555";
    body.appendChild(el);
  }

  el.innerText = message || "Checking article access...";
}

async function startSubscription(){

  const user_id = getUser();

  if(!user_id){
    requestArticleLogin();
    return;
  }

  try {
    const res = await fetch(
      `${API}?action=subscription_status&user_id=${encodeURIComponent(user_id)}`
    );

    const status = await res.json();
    const isSubscriber =
      status.subscriber === true ||
      String(status.subscriber || "").toLowerCase() === "true" ||
      String(status.subscription_status || "").toLowerCase() === "active" ||
      status.can_subscribe === false;

    if(isSubscriber){
      alert(status.message || "Your CGN News subscription is already active.");
      localStorage.setItem("subscriber", "true");
      loadArticle();
      return;
    }

    localStorage.setItem("subscriber", "false");
    localStorage.setItem("last_article_url", window.location.href);
    showArticlePayPalCheckout();

  } catch(e){
    console.error("SUBSCRIPTION STATUS ERROR:", e);
    localStorage.setItem("last_article_url", window.location.href);
    showArticlePayPalCheckout();
  }
}

function slugify(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function slugifyCategory(category){
  return slugify(category);
}

function getCategoryPath(category){

  const categoryName = String(category || "").trim();
  const normalized = categoryName.toLowerCase();

  if(normalized === "weather"){ return "/weather/"; }
  if(normalized === "sports"){ return "/sports/"; }
  return `/news/?category=${encodeURIComponent(categoryName || "News")}`;
}

function getArticleFamily(article){

  const existingPath = normalizeArticlePath(article.url || article.canonical_url || "");

  if(existingPath.startsWith("/weather/")){
    return "weather";
  }

  if(existingPath.startsWith("/sports/")){
    return "sports";
  }

  const category = String(article.category || "").trim().toLowerCase();

  if(category === "weather"){
    return "weather";
  }

  if(category === "sports"){
    return "sports";
  }

  return "news";
}

function normalizeArticlePath(pathValue){

  let path = String(pathValue || "").trim();

  if(!path){
    return "";
  }

  if(path.startsWith("https://www.cgnnews.net")){
    path = path.replace("https://www.cgnnews.net", "");
  }

  if(path.startsWith("http://www.cgnnews.net")){
    path = path.replace("http://www.cgnnews.net", "");
  }

  if(path.startsWith(window.location.origin)){
    path = path.replace(window.location.origin, "");
  }

  if(!path.startsWith("/")){
    path = "/" + path;
  }

  path = path.split("?")[0].split("#")[0];

  // Treat explicit static files as the same article as the clean folder URL.
  // /news/YYYY/MM/DD/slug/index.html => /news/YYYY/MM/DD/slug/
  path = path.replace(/\/index\.html$/i, "/");

  // Article URLs should resolve to static folder pages:
  // /news/YYYY/MM/DD/slug/
  // /weather/YYYY/MM/DD/slug/
  // /sports/YYYY/MM/DD/slug/
  if(
    (path.startsWith("/news/") || path.startsWith("/weather/") || path.startsWith("/sports/")) &&
    !path.endsWith("/")
  ){
    path += "/";
  }

  return path;
}

function buildArticlePath(article){

  const existing = normalizeArticlePath(article.url || article.canonical_url || "");

  if(existing){
    return existing;
  }

  const articleSlug = article.slug || slug;
  const year = article.year || "";
  const month = article.month || "";
  const day = article.day || "";
  const family = getArticleFamily(article);

  if(year && month && day && articleSlug){
    return normalizeArticlePath(`/${family}/${year}/${month}/${day}/${articleSlug}`);
  }

  return normalizeArticlePath(window.location.pathname);
}

/* CGN DISPLAY DATE FORMAT */
function parseCgnArticleDate(dateValue){

  if(!dateValue){
    return null;
  }

  if(dateValue instanceof Date){
    return isNaN(dateValue.getTime()) ? null : dateValue;
  }

  if(typeof dateValue === "number"){
    const numericDate = new Date(dateValue);
    return isNaN(numericDate.getTime()) ? null : numericDate;
  }

  let raw = String(dateValue || "").trim();

  if(!raw){
    return null;
  }

  // Respect explicit timezone markers already supplied by the backend.
  const hasExplicitTimeZone =
    /(?:z|[+-]\d{2}:?\d{2})$/i.test(raw) ||
    /\b(?:utc|gmt)\b/i.test(raw);

  if(hasExplicitTimeZone){
    const explicitDate = new Date(raw.replace(" ", "T"));
    if(!isNaN(explicitDate.getTime())){
      return explicitDate;
    }

    const fallbackExplicitDate = new Date(raw);
    return isNaN(fallbackExplicitDate.getTime()) ? null : fallbackExplicitDate;
  }

  // Google Sheets / Apps Script often returns timezone-less timestamps.
  // CGN article timestamps are treated as UTC when no offset is present.
  const match = raw.match(
    /^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})(?:[ T](\d{1,2}):(\d{2})(?::(\d{2})(?:\.(\d{1,3}))?)?)?$/
  );

  if(match){
    const year = Number(match[1]);
    const month = Number(match[2]);
    const day = Number(match[3]);
    const hour = Number(match[4] || 0);
    const minute = Number(match[5] || 0);
    const second = Number(match[6] || 0);
    const millisecond = Number((match[7] || "0").padEnd(3, "0"));

    const utcDate = new Date(Date.UTC(year, month - 1, day, hour, minute, second, millisecond));
    return isNaN(utcDate.getTime()) ? null : utcDate;
  }

  const fallbackDate = new Date(raw);
  return isNaN(fallbackDate.getTime()) ? null : fallbackDate;
}

function getEasternDateParts(dateObj){
  const d = dateObj instanceof Date ? dateObj : parseCgnArticleDate(dateObj);

  if(!d || isNaN(d.getTime())){
    return null;
  }

  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone:"America/New_York",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:false,
    hourCycle:"h23"
  }).formatToParts(d);

  const map = {};
  parts.forEach(part => {
    if(part.type !== "literal"){
      map[part.type] = part.value;
    }
  });

  return {
    year:Number(map.year),
    month:Number(map.month),
    day:Number(map.day),
    hour:Number(map.hour),
    minute:Number(map.minute),
    second:Number(map.second)
  };
}

function getEasternOffsetMinutes(dateObj){
  const d = dateObj instanceof Date ? dateObj : parseCgnArticleDate(dateObj);
  const eastern = getEasternDateParts(d);

  if(!d || !eastern || isNaN(d.getTime())){
    return null;
  }

  const easternAsUtc = Date.UTC(
    eastern.year,
    eastern.month - 1,
    eastern.day,
    eastern.hour,
    eastern.minute,
    eastern.second
  );

  return Math.round((easternAsUtc - d.getTime()) / 60000);
}

function getEasternTimeZoneAbbreviation(dateObj){
  const d = dateObj instanceof Date ? dateObj : parseCgnArticleDate(dateObj);

  if(!d || isNaN(d.getTime())){
    return "ET";
  }

  const offset = getEasternOffsetMinutes(d);

  if(offset === -240){
    return "EDT";
  }

  if(offset === -300){
    return "EST";
  }

  // Last-resort DST approximation only if offset calculation fails.
  const easternMonth = Number(new Intl.DateTimeFormat("en-US", {
    timeZone:"America/New_York",
    month:"numeric"
  }).format(d));

  return easternMonth >= 3 && easternMonth <= 11 ? "EDT" : "EST";
}

function formatDate(dateString){

  if(!dateString) return "";

  const d = parseCgnArticleDate(dateString);

  if(!d || isNaN(d.getTime())) return "";

  const parts = new Intl.DateTimeFormat("en-US", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit",
    hour12: true,
    hourCycle: "h12",
    timeZone: "America/New_York"
  }).formatToParts(d);

  const map = {};
  parts.forEach(part => {
    if(part.type !== "literal"){
      map[part.type] = part.value;
    }
  });

  const hour = String(map.hour || "12").replace(/^0+/, "") || "12";
  const dayPeriod = String(map.dayPeriod || "").toUpperCase();
  const tz = getEasternTimeZoneAbbreviation(d);

  return `${map.weekday}, ${map.day} ${map.month} ${map.year} at ${hour}:${map.minute}:${map.second} ${dayPeriod} ${tz}`;
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getLockedArticlePreviewHtml(article){
  if(!article){
    return "";
  }

  const preview =
    article.preview_html ||
    article.teaser_html ||
    article.excerpt_html ||
    "";

  if(preview){
    return preview;
  }

  const summary = article.summary || article.subtitle || "";

  if(summary){
    return `<p>${escapeHtml(summary)}</p>`;
  }

  return `<p>This article is available to CGN News subscribers.</p>`;
}
function reporterEmailFromName(authorName){

  const name = String(authorName || "").trim();

  if(!name || name.toLowerCase() === "cgn news" || name.toLowerCase() === "cgn news staff"){
    return "tips@cgnnews.net";
  }

  const cleanParts = name
    .toLowerCase()
    .replace(/[^a-z\s-]/g, "")
    .split(/\s+/)
    .filter(Boolean);

  if(cleanParts.length < 2){
    return "tips@cgnnews.net";
  }

  const first = cleanParts[0].replace(/-/g, "");
  const last = cleanParts[cleanParts.length - 1].replace(/-/g, "");

  return `${first}.${last}@cgnnews.net`;
}

function setReporterEmailButton(article, canonicalUrl){

  const btn = document.getElementById("email-reporter-btn");
  if(!btn) return;

  const authorName = article.author || "CGN News";
  const email = reporterEmailFromName(authorName);
  const subject = `RE: ${authorName}`;
  const title = article.title || "CGN News article";

  const body =
    `Hello ${authorName},\n\n` +
    `I read your article on CGN News and wanted to contact you regarding:\n\n` +
    `${title}\n` +
    `${canonicalUrl}\n\n`;

  btn.href =
    `mailto:${encodeURIComponent(email)}` +
    `?subject=${encodeURIComponent(subject)}` +
    `&body=${encodeURIComponent(body)}`;

  btn.setAttribute("aria-label", `Email ${authorName}`);
}

  document.title = "Article Not Found | CGN News";

  const robots = document.querySelector('meta[name="robots"]');
  if(robots){
    robots.setAttribute("content", "noindex, follow");
  }

  const canonical = document.getElementById("canonical-link");
  if(canonical){

  }

/* RENDER ARTICLE — shared by backend article.html and future static /news/.../slug/index.html pages */
function renderArticle(article){

  if(!article || article.error){
    if(cgnMaybeRedirectMissingArticleToArchives(article)){
      return;
    }
    setArticleNotFound();
    return;
  }

  const accessDecision = cgnArticleAccessDecision(article);
  const locked = accessDecision.locked;
  const paywallArticle = Object.assign({}, article, {
    paywall_limit: article.paywall_limit || accessDecision.paywall_limit
  });

  const actions = document.querySelector(".article-actions");
  if(actions){
    actions.style.display = "";
  }

  const robots = document.querySelector('meta[name="robots"]');
  if(robots){
    robots.setAttribute("content", "index, follow, max-image-preview:large");
  }

  const normalizedArticlePath = buildArticlePath(article);

  const canonicalUrl = normalizedArticlePath
    ? window.location.origin + normalizedArticlePath
    : window.location.href;

  const summary = article.summary || article.subtitle || "";
  const title = article.title || "Article";
  const image = article.image || article.image_url || article.hero_image_url || "https://ios.cgnnews.net/CGNNewsNowLogo.png";
  const categoryName = article.category || "News";
  const categoryPath = getCategoryPath(categoryName);

  const reporterSlug = article.author_slug ||
    String(article.author || "cgn-news-staff").toLowerCase().replace(/\s+/g, "-");

  document.title = title + " | CGN News";

  document.getElementById("page-title").innerText = title + " | CGN News";
  document.getElementById("title").innerText = title;
  document.getElementById("subtitle").innerText = article.subtitle || "";
  document.getElementById("category").innerHTML = `<a href="${categoryPath}">${categoryName}</a>`;

  document.getElementById("meta").innerHTML = `
    <div class="meta-row">
      <div class="meta-label">Category:</div>
      <div class="meta-value"><a href="${categoryPath}">${categoryName}</a></div>
    </div>
    <div class="meta-row">
      <div class="meta-label">By:</div>
      <div class="meta-value"><a href="/reporters/">${article.author || "CGN News"}</a></div>
    </div>
    <div class="meta-row">
      <div class="meta-label">Published:</div>
      <div class="meta-value">${formatDate(article.published_at)}</div>
    </div>
    <div class="meta-row">
      <div class="meta-label">Updated:</div>
      <div class="meta-value">${formatDate(article.updated_at || article.published_at)}</div>
    </div>
  `;

  setReporterEmailButton(article, canonicalUrl);

  const hero = document.getElementById("hero");
  const heroImage = article.image || article.image_url || article.hero_image_url || "";
  if(heroImage){
    hero.src = heroImage;
    hero.alt = title || "CGN News article image";
    hero.style.display = "block";
  } else {
    hero.style.display = "none";
  }

  const credit = document.getElementById("image-credit");
  if(credit){
    const imageCredit = article.credit || article.image_credit || "";
    credit.innerText = imageCredit ? "Image: " + imageCredit : "";
  }

  // Backend remains the authority for live paywall access.
  // If locked, never expose the full body or full What This Means from article.html.
  const bodyEl = document.getElementById("body");
  const analysisEl = document.getElementById("analysis");
  const analysisBox = document.querySelector(".analysis-box");

  if(locked){
    bodyEl.classList.add("cgn-paywalled-content");
    bodyEl.innerHTML = getLockedArticlePreviewHtml(article);
    showPaywall(paywallArticle);

    const analysisPreview =
      article.what_this_means_preview ||
      article.analysis_preview ||
      article.preview_what_this_means ||
      "";

    if(analysisPreview){
      analysisEl.innerHTML = analysisPreview;
      if(analysisBox) analysisBox.style.display = "";
    } else {
      analysisEl.innerHTML = "";
      if(analysisBox) analysisBox.style.display = "none";
    }
  } else {
    bodyEl.classList.remove("cgn-paywalled-content");
    bodyEl.innerHTML = article.body_html || "";
    clearPaywall();

    analysisEl.innerHTML = article.analysis || article.what_this_means || "";
    if(analysisBox){
      analysisBox.style.display = analysisEl.innerHTML.trim() ? "" : "none";
    }
  }

  document.getElementById("canonical-link").href = canonicalUrl;

  // Clean browser URL only when we have a real article path.
  // This prevents /article.html from becoming the canonical article URL.
  if(
    normalizedArticlePath &&
    window.location.pathname !== normalizedArticlePath &&
    !window.location.pathname.endsWith("/article.html")
  ){
    window.history.replaceState({}, "", normalizedArticlePath);
  }

  document.getElementById("meta-description").content = summary;

  const ogTitle = document.getElementById("og-title");
  const ogDescription = document.getElementById("og-description");
  const ogUrl = document.getElementById("og-url");
  const ogImage = document.getElementById("og-image");
  const twitterTitle = document.getElementById("twitter-title");
  const twitterDescription = document.getElementById("twitter-description");
  const twitterImage = document.getElementById("twitter-image");

  if(ogTitle) ogTitle.setAttribute("content", title + " | CGN News");
  if(ogDescription) ogDescription.setAttribute("content", summary);
  if(ogUrl) ogUrl.setAttribute("content", canonicalUrl);
  if(ogImage) ogImage.setAttribute("content", image);
  if(twitterTitle) twitterTitle.setAttribute("content", title + " | CGN News");
  if(twitterDescription) twitterDescription.setAttribute("content", summary);
  if(twitterImage) twitterImage.setAttribute("content", image);

  const jsonLd = {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "@id": canonicalUrl + "#article",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": canonicalUrl
    },
    "headline": title,
    "description": summary,
    "image": [image],
    "datePublished": article.published_at || "",
    "dateModified": article.updated_at || article.published_at || "",
    "author": {
      "@type": "Person",
      "name": article.author || "CGN News Staff",
      "url": window.location.origin + "/reporters/" + reporterSlug
    },
    "publisher": {
      "@type": "NewsMediaOrganization",
      "name": "CGN News",
      "legalName": "Cook Global News Network",
      "url": "https://www.cgnnews.net/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://ios.cgnnews.net/CGNNewsNowLogo.png"
      }
    },
    "isAccessibleForFree": locked ? false : true
  };

  if(locked){
    jsonLd.hasPart = {
      "@type": "WebPageElement",
      "isAccessibleForFree": false,
      "cssSelector": CGN_PAYWALLED_CONTENT_SELECTOR
    };
  }

  const jsonLdEl = document.getElementById("article-jsonld");
  if(jsonLdEl){
    jsonLdEl.textContent = JSON.stringify(jsonLd);
  }
}

/* LOAD PROTECTED ARTICLE */
async function loadArticle(){

  // Static generated /news/YYYY/MM/DD/slug/index.html pages may set:
  // window.CGN_STATIC_ARTICLE = {...}
  // before this file's render logic runs.
  //
  // Important: static data is only the crawlable first paint / teaser.
  // The live backend remains the authority for the 3/6/subscriber paywall decision.
  const staticArticle = window.CGN_STATIC_ARTICLE || null;
  const user_id = getUser();
  const anon_id = getAnonId();

  if(user_id){
    await refreshCgnSubscriptionStatus(user_id);
  }

  if(staticArticle && !window.__CGN_STATIC_ARTICLE_FIRST_PAINT_DONE){
    window.__CGN_STATIC_ARTICLE_FIRST_PAINT_DONE = true;
    renderArticle(staticArticle);
    showArticleAccessStatus("Checking article access...");
  }

  const liveSlug = cleanArticleSlug(staticArticle?.slug) || slug;

  if(!liveSlug || (window.CGN_NOW_DISABLE_PATH_SLUG_DERIVE && !window.CGN_NOW_IS_ARTICLE_ROUTE && !staticArticle)){
    if(!staticArticle){ setArticleNotFound(); }
    return;
  }

  const articleUrl =
    API +
    "?action=article" +
    "&slug=" + encodeURIComponent(liveSlug) +
    "&user_id=" + encodeURIComponent(user_id) +
    "&anon_id=" + encodeURIComponent(anon_id);

  try {

    const res = await fetch(articleUrl);
    const article = await res.json();

    renderArticle(article);
    clearArticleAccessStatus();

  } catch(err){

    console.error("ARTICLE LOAD ERROR:", err);

    // If this is a generated static article page, keep the crawlable/static
    // article shell visible instead of replacing it with Article Not Found.
    if(staticArticle){
      showArticleAccessStatus("Live article access is temporarily unavailable. Please refresh the page.");
      return;
    }

    setArticleLoadError();

  }
}

updateAccountUI();
loadArticle();
