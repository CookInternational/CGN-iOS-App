<body>

<h1 id="headline">Confirming Your Subscription</h1>
<p id="message-primary">
  Please wait while CGN News attaches your subscription to your account.
</p>
<p id="message-secondary">
  This should only take a moment.
</p>

  Checking your CGN News account...
</div>

</div>

<script src="/assets/cgn-payments.js"></script>
<script>

const CGN_DEFAULT_API_BASE = "https://script.google.com/macros/s/AKfycbx41mQg-Ine3XZ-VrMI_SaQn4_K6cDQHA0cBFyGPgupu_edNFoNRjSLv2hoSe_bOytt/exec";
const API =
  window.CGN_API_BASE ||
  window.CGN_API_URL ||
  localStorage.getItem("cgn_api_base") ||
  CGN_DEFAULT_API_BASE;

function getUrlParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name) || "";
}

function getUser(){

  const urlUserId = getUrlParam("user_id");

  if(urlUserId){
    localStorage.setItem("user_id", urlUserId);
    return urlUserId;
  }

  return localStorage.getItem("user_id") || "";
}


function getPaymentCurrency(){
  const fromUrl = getUrlParam("currency");
  if(window.CGNPayments) return window.CGNPayments.normalizeCurrency(fromUrl || localStorage.getItem("cgn_payment_currency") || "USD");
  return String(fromUrl || localStorage.getItem("cgn_payment_currency") || "USD").toUpperCase().replace(/[^A-Z]/g, "") || "USD";
}

function getPaymentHostedButtonId(currency){
  const fromUrl = getUrlParam("hosted_button_id") || getUrlParam("paypal_button_id");
  if(fromUrl) return fromUrl;
  if(window.CGNPayments){
    const cfg = window.CGNPayments.byCode(currency || getPaymentCurrency());
    return cfg.hostedButtonId;
  }
  return localStorage.getItem("cgn_payment_hosted_button_id") || "";
}

function setStatus(type, label, headline, primary, secondary){

  const statusLabel = document.getElementById("status-label");
  const headlineEl = document.getElementById("headline");
  const primaryEl = document.getElementById("message-primary");
  const secondaryEl = document.getElementById("message-secondary");
  const notice = document.getElementById("notice");

  if(statusLabel) statusLabel.innerText = label || "";
  if(headlineEl) headlineEl.innerText = headline || "";
  if(primaryEl) primaryEl.innerText = primary || "";
  if(secondaryEl) secondaryEl.innerText = secondary || "";

  if(notice){
    notice.className = "notice" + (type ? " " + type : "");
    notice.innerText = secondary || "";
  }
}

async function confirmSubscription(){

  const user_id = getUser();

  if(!user_id){

    localStorage.removeItem("subscriber");

    setStatus(
      "error",
      "Account Required",
      "Subscription Could Not Be Attached",
      "CGN News could not find a signed-in account in this browser.",
      "Please log in or create an account first, then subscribe again so the purchase can attach to your CGN News account."
    );

    return;
  }

  try {

    setStatus(
      "",
      "Processing Subscription",
      "Confirming Your Subscription",
      "Please wait while CGN News attaches your subscription to your account.",
      "Checking your CGN News account..."
    );

    const currency = getPaymentCurrency();
    const hostedButtonId = getPaymentHostedButtonId(currency);
    const query = new URLSearchParams({
      action:"confirm_payment",
      user_id:user_id,
      currency:currency,
      hosted_button_id:hostedButtonId,
      paypal_button_id:hostedButtonId,
      source:"payment-success.html"
    });

    const res = await fetch(`${API}?${query.toString()}`);

    const data = await res.json();

    if(data.success){

      localStorage.setItem("subscriber", "true");
      if(data.currency){ localStorage.setItem("cgn_last_confirmed_currency", data.currency); }

      if(data.already_active){

        setStatus(
          "success",
          "Already Active",
          "Your Subscription Is Already Active",
          "Your CGN News account already has unlimited access.",
          "You can continue reading CGN News."
        );

      } else {

        setStatus(
          "success",
          "Subscription Confirmed",
          "Subscription Confirmed",
          "Thank you for subscribing to CGN News.",
          "Your account now has unlimited access."
        );
      }

      return;
    }

    localStorage.removeItem("subscriber");

    setStatus(
      "error",
      "Confirmation Failed",
      "Subscription Could Not Be Confirmed",
      "The payment was returned, but CGN News could not attach it to your account.",
      data.error || "Please contact CGN News support at tips@cgnnews.net."
    );

  } catch(err){

    console.error("CONFIRM SUBSCRIPTION ERROR:", err);

    localStorage.removeItem("subscriber");

    setStatus(
      "error",
      "Connection Error",
      "Subscription Could Not Be Confirmed",
      "CGN News could not reach the subscription system.",
      "Please refresh this page once. If the issue continues, contact tips@cgnnews.net."
    );
  }
}

function goHome(){
  window.location.href = "/";
}

function goBackToArticle(){

  const lastArticle = localStorage.getItem("last_article_url");

  if(lastArticle){
    window.location.href = lastArticle;
    return;
  }

  window.location.href = "/";
}

confirmSubscription();

</script>
